<!DOCTYPE html>                                                                                     <!--Sets document type-->
<html lang="en">                                                                                    <!--Sets language to English-->
<head>                                                                                              <!--Sets up the Head element-->
  <title>Hello, Map!</title>                                                                        <!--Sets the internal map title-->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />                             <!--Sets the viewport for responsive design-->
  <meta name="description" content="" />

  <!-- calls for the arcgis api's CSS file and JS library. -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.25/"></script>

  <!-- Adding the modules, API key, and map constant needed for a full screen map app -->
  <script>
  
    require([
     "esri/config",
      "esri/Map",
      "esri/views/MapView"
      <!--These two will give our web map the ability to work  with graphics-->
      "esri/Graphic",
      "esri/layers/GraphicsLayer"

    ], function (esriConfig,Map, MapView, Graphic, GraphicsLayer) {

      esriConfig.apiKey = "AAPTau7l9zV1JqiD1DBhryF-CPg..ZLSOcbqgh0ONE2slQEiaTqrrUI9TlEQg-3ZfWtrR-Ur2oKQRwsv-KCdLKsARwQBmPGaG2FKABsW3UmmWIU-XJKOMLXRXHIwIGTZ-em8fZ6ln7jgXILnyk_sdiPEmyHHJ2R3aewVZeHoN_D5zBlUrSDh34lDuLWb8Pqkd_AZTEeTKoUFodKYWH-GFpwherADvTOzXsWe5qGAf9LXl64x-tfRA3Ohh_KUnBRvjZni6S_7xIgaT4DTFIQZ8DMMEk0vvSSN_JwLUAT1_WThHLKNd";
      const map = new Map({
        basemap: "arcgis-topographic" // Basemap layer
      });

      const view = new MapView({
          map: map,
          center: [-164.083328, 59.940174], // Longitude, latitude
          zoom: 13, // Zoom level
          container: "viewDiv" // Div element
        });

        //adding the constructor for the graphics layer
        const graphicsLayer = new GraphicsLayer();
        map.add(graphicsLayer);

        //defining the geometry of the point
        const point = {
          type: "point",
          longitude: -164.083328,
          latitude: 59.940174
        };

        //defining the maker style
        const simpleMarkerSymbol = {
          type: "simple-marker",
          color: [0, 0, 139] 
          outline: {
            color: [255, 255, 255],
            width: 2
          }
        };

        //creating the point
        const pointGraphic = new Graphic({
          geometry: point,
          symbol: simpleMarkerSymbol
        })
    });
  </script>

  <!-- css to make a full screen map -->
  <style>
    html,
    body,
    #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>

</head>
<body>

  <!-- the div to displays the map  -->
  <div id="viewDiv"></div>

</body>
